[alembic]
# مسار مجلد سكربتات الترحيل (Migrations)
script_location = alembic

# تنسيق اسم ملف الترحيل
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# المنطقة الزمنية المستخدمة في الطوابع الزمنية لأسماء الملفات (اختياري)
# timezone = Africa/Cairo

# الحد الأقصى لطول الاسم المختصر (slug) في اسم الملف
truncate_slug_length = 40

# لا حاجة لتحديد sqlalchemy.url هنا، يتم تمريره ديناميكياً من env.py
# بالاعتماد على app.config.settings.DATABASE_URL
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# يمكن تفعيل تنسيق تلقائي للكود الناتج عبر black إذا رغبت:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
